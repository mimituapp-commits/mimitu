# Stack de desarrollo/staging para Mimitu.
# `docker compose up` levanta API + Postgres + MinIO (S3 compatible).
# El backend dev usa store JSON por defecto; al definir DATABASE_URL usará Postgres.
services:
  api:
    build: .
    ports: ["4000:4000"]
    environment:
      PORT: 4000
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET:-cambia-esto}
      DATABASE_URL: postgres://mimitu:mimitu@db:5432/mimitu
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: mimitu-evidence
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      REVENUECAT_WEBHOOK_AUTH: ${REVENUECAT_WEBHOOK_AUTH:-}
    depends_on: [db, minio]
    volumes: ["./data:/app/data"]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mimitu
      POSTGRES_PASSWORD: mimitu
      POSTGRES_DB: mimitu
    ports: ["5432:5432"]
    volumes:
      - dbdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

volumes:
  dbdata:
  miniodata:
