<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>Mimitu</title>
  <meta name="description" content="Gamificación para parejas: gana mimitus con acciones positivas y canjéalas por premios." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#6C4DF6" />

  <!-- Tipografías de marca: Baloo 2 (display) + Mulish (texto/UI) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Mulish:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <!-- iOS standalone (Agregar a pantalla de inicio) -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mimitu" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" aria-live="polite"></div>
  <div id="toast" class="toast" role="status" aria-live="assertive"></div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
